# Music Downloader Configuration
# Copy this file to mdl-config.toml and fill in your Deezer ARL.
#
# This file overrides streamrip's config. For advanced streamrip settings,
# run `rip config open` to edit streamrip's config directly.

[deezer]
# Required: your Deezer ARL authentication cookie.
# Get it at: https://github.com/nathom/streamrip/wiki/Finding-Your-Deezer-ARL-Cookie
# Deezer ARLs expire every 3-4 months — you'll need to refresh it.
arl = ""
# Quality: 0 = 128kbps, 1 = 320kbps MP3, 2 = FLAC (requires paid Deezer)
quality = 1

[downloads]
# Folder where tracks are downloaded to
folder = "~/Music/Music Downloader"

[filepaths]
# Available keys: "tracknumber", "artist", "albumartist", "composer", "title", "albumcomposer", "explicit"
track_format = "{artist} - {title}{explicit}"

[spotify]
# Optional: provide your own Spotify credentials.
# Get them at: https://developer.spotify.com/dashboard/
# client_id = ""
# client_secret = ""
